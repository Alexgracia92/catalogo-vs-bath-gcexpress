<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Catálogo</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center; /* Centra horizontalmente todo el contenido */
        }

        h1 { text-align: center; }

        /* Contenedor que agrupa los productos y los centra */
        #catalogo {
            display: grid;
            grid-template-columns: repeat(auto-fill, 200px); /* Tamaño fijo para los cuadros */
            gap: 20px;
            justify-content: center; /* Esta línea es la que centra los cuadros */
            width: 100%;
            max-width: 1000px;
        }
        
        .producto { 
            border: 1px solid #ccc; 
            padding: 10px; 
            border-radius: 8px; 
            text-align: center; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .producto img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            border-radius: 4px; 
        }
    </style>
</head>
<body>

    <h1>CATALOGO VICTORIA SECRET Y BATH &BODY WORKS</h1>

    <div id="catalogo">Cargando productos...</div>

    <script>
        fetch('productos.json')
            .then(response => response.json())
            .then(data => {
                const contenedor = document.getElementById('catalogo');
                contenedor.innerHTML = '';
                data.forEach(p => {
                    contenedor.innerHTML += `
                        <div class="producto">
                            <img src="${p.url_imagen}" alt="${p.nombre}">
                            <h3>${p.nombre}</h3>
                            <p>$${p.precio}</p>
                        </div>
                    `;
                });
            });
    </script>
</body>
</html>
