<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo VS & Bath</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* Estilos de Marca */
        :root {
        --vs-pink: #FF66B2;
        --vs-black: #1A1A1A;
        }
        body { background-color: #fcfcfc !important; color: var(--vs-black); }
        h1 { font-weight: 700; color: var(--vs-black); letter-spacing: -1px; }
    
        .card { border: none; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .card-img-top { height: 280px; object-fit: cover; }
        
        .btn-outline-primary { 
            border-color: var(--vs-pink); color: var(--vs-pink); 
        }
        .btn-outline-primary:hover { background-color: var(--vs-pink); border-color: var(--vs-pink); color: white; }
    
        .btn-success { background-color: var(--vs-pink); border: none; font-weight: 600; }
        .btn-success:hover { background-color: #ff4da6; }
    
        .producto-card { transition: transform 0.3s ease; }
        .producto-card:hover { transform: translateY(-10px); }
    </style>
</head>
<body class="bg-light">

<div class="container my-5">
    <h1 class="text-center mb-4">Catálogo VS & Bath</h1>
    <p class="text-center lead mb-4 text-muted">
        Descubre nuestra selección exclusiva de fragancias, lociones y sets de edición limitada. 
        Encuentra tu aroma favorito y llévate la experiencia de lujo directamente a tu hogar. 
        ¡Tu próxima fragancia te está esperando!
    </p>
    
    <!-- Barra de búsqueda y Filtros -->
    <div class="row mb-4">
        <div class="col-md-8 mx-auto">
            <input type="text" id="buscador" class="form-control mb-3" placeholder="Buscar producto...">
            <div class="d-flex justify-content-center gap-2 flex-wrap" id="filtros">
                <button class="btn btn-outline-primary" onclick="filtrar('Todos')">Todos</button>
                <button class="btn btn-outline-primary" onclick="filtrar('Fragance mist')">Mist</button>
                <button class="btn btn-outline-primary" onclick="filtrar('Fragance lotion')">Lociones</button>
                <button class="btn btn-outline-primary" onclick="filtrar('Pink')">Pink</button>
                <button class="btn btn-outline-primary" onclick="filtrar('Set')">Sets</button>
            </div>
        </div>
    </div>

    <div id="catalogo" class="row row-cols-1 row-cols-md-3 g-4"></div>
</div>

<script>
    let productos = [];

    fetch('productos.json')
        .then(res => res.json())
        .then(data => {
            productos = data;
            mostrarProductos(productos);
        });

    function mostrarProductos(lista) {
        const contenedor = document.getElementById('catalogo');
        contenedor.innerHTML = lista.map(p => `
            <div class="col">
                <div class="card h-100 producto-card">
                    <img src="${p.url_imagen}" class="card-img-top" alt="${p.nombre}">
                    <div class="card-body">
                        <h5 class="card-title">${p.nombre}</h5>
                        <p class="text-muted small">${p.categoria}</p>
                        <p class="fw-bold text-primary fs-5">$${p.precio}</p>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // Buscador
    document.getElementById('buscador').addEventListener('input', (e) => {
        const busqueda = e.target.value.toLowerCase();
        const filtrados = productos.filter(p => p.nombre.toLowerCase().includes(busqueda));
        mostrarProductos(filtrados);
    });

    // Filtro por categoría
    function filtrar(cat) {
        const filtrados = (cat === 'Todos') ? productos : productos.filter(p => p.categoria === cat);
        mostrarProductos(filtrados);
    }
</script>

</body>
</html>
